services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: strideflow
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5434:5432"
    volumes:
      - strideflow-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d strideflow"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6380:6379"
    volumes:
      - strideflow-redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ConnectionStrings__Postgres: Host=postgres;Port=5432;Database=strideflow;Username=postgres;Password=postgres
      Redis__ConnectionString: redis:6379
      Redis__InstanceName: strideflow
      Jwt__Issuer: StrideFlow
      Jwt__Audience: StrideFlow.Client
      Jwt__Key: strideflow-production-signing-key-change-before-public-launch-1234567890
      ClientApp__AllowedOrigins__0: http://localhost:18080
    ports:
      - "18080:8080"

volumes:
  strideflow-postgres:
  strideflow-redis:
